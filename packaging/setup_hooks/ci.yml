# NexusRT CI configuration (GitHub Actions).
# Validates on Ubuntu 22.04 + macOS 13 across Python 3.10/3.11/3.12.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CMAKE_BUILD_TYPE: Release
  NEXUSRT_BUILD_TESTS: ON

jobs:
  build-linux-cuda:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install CUDA 12.x
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'
          method: network

      - name: Install build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build libcudnn8 libnccl2 libnccl-dev

      - name: Configure
        run: |
          cmake -S packaging -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEXUSRT_ENABLE_CUDA=ON \
            -DNEXUSRT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j --target nexusrt

      - name: Test (C++)
        run: ctest --test-dir build --output-on-failure

      - name: Install Python bindings
        run: |
          pip install -U pip
          pip install -e .[dev]

      - name: Test (Python, no GPU)
        run: pytest tests/unit -m 'not gpu' --cov=nexusrt --cov-fail-under=85

  build-macos-metal:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install build deps
        run: brew install cmake ninja

      - name: Configure
        run: |
          cmake -S packaging -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEXUSRT_ENABLE_METAL=ON \
            -DNEXUSRT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j --target nexusrt

      - name: Test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  docs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r docs/requirements.txt
      - run: sphinx-build -W -b html docs/ build/docs
